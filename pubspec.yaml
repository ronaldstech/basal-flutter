name: basal
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.42
  audio_video_progress_bar: ^2.0.1
  flutter_riverpod: ^2.6.1
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  iconsax: ^0.0.8
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  flutter_svg: ^2.0.10+1
  path_provider: ^2.1.5
  http: ^1.6.0
  image_picker: ^1.1.2
  http_parser: ^4.0.2
  firebase_messaging: ^15.2.10
  audio_service: ^0.18.17
  flutter_local_notifications: ^17.2.3
  shimmer: ^3.0.0
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"
  image: "logo.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
